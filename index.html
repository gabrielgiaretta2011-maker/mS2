
                            <div class="letter-border">
                                <div class="letter-content">
                                    <p class="letter-title">Para o meu amor...</p>
                                    <p id="typewriter-text" class="letter-text"></p>
                                    <span class="letter-stamp">💜</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <p class="instruction">Toque para abrir 💌</p>
            </section>
        </header>

        <section class="timeline" id="main-timeline"></section>

        <section class="gallery-section">
            <h2 class="section-title">Nossos Momentos</h2>
            <div class="admin-controls">
                <div style="margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px;">
                    <input type="date" id="eventDate" style="padding: 10px; border-radius: 10px; border: 1px solid var(--accent-purple); background: rgba(0,0,0,0.3); color: white;">
                    <input type="text" id="imageCaption" placeholder="Escreva uma legenda..." style="padding: 10px; border-radius: 10px; border: 1px solid var(--accent-purple); background: rgba(0,0,0,0.3); color: white;">
                </div>
                
                <label for="imageInput" class="upload-btn">✨ Adicionar Foto</label>
                <input type="file" id="imageInput" accept="image/*" style="display: none;">
            </div>
            <div class="gallery-grid" id="galleryGrid"></div>
        </section>

        <div class="final-action" id="final-action-container" style="text-align: center; margin: 60px 0; display: none;">
            <button id="final-surprise-btn">Tenho uma última pergunta... ✨</button>
        </div>
    </main>

    <div id="proposal-modal">
        <div class="proposal-card">
            <h2>Quer voltar comigo? 🥺❤️</h2>
            <div class="proposal-buttons">
                <button id="btn-yes">Sim!</button>
                <button id="btn-no">Não</button>
            </div>
            <p id="error-msg">Erro: Apenas a opção "SIM" é aceita por este coração! 🥰</p>
        </div>
    </div>

    <div class="music-player">
        <p>Nossa Música 🎵</p>
        <audio id="romanticAudio" loop></audio>
        <div class="music-controls">
            <button id="music-btn">▶️ Tocar</button>
            <label for="musicInput" class="music-upload-label">📁</label>
            <input type="file" id="musicInput" accept="audio/*" style="display: none;">
        </div>
        <div id="music-name">Selecione uma música</div>
    </div>

    <button id="theme-toggle">🌙</button>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="script.js"></script>
</body>
</html>
